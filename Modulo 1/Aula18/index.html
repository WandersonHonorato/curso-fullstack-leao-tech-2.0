            let cadastros = []

            function cadastrarContatos(nome, telefone, cidade, idade, profissao, cadastros){
     
            let cadastrar = {
            nome: prompt('Digite o seu nome:'),
            telefone: prompt('Digite o seu telefone:'),
            cidade: parseInt(prompt('Digite a sua cidade:')),
            idade: parseInt(prompt('Digite a sua idade:')),
            profissao: prompt('Digite a sua profissão:')
            };
            cadastros.push(cadastrar)


        function validarDados(validarNome, validarTelefone, validarCidade, validarIdade, validarProfissao){
                console.log('Validando os dados do cadastro...')
                if(validarNome === '' || validarTelefone === '' || validarCidade === '' || validarIdade === '' || validarProfissao === ''){
                    console.log('Erro: Todos os campos devem ser preenchidos!')
                    return false
                } else {
                    console.log('Dados validados com sucesso!')
                    return true
            }
        }

        function listarContatos(cadastros){
            console.log('Listando os contatos cadastrados...')
            for(let i = 0; i < cadastros.length; i++){
                console.log( `Nome: ${cadastros[i].nome} - \nTelefone: ${cadastros[i].telefone} - \nCidade: ${cadastros[i].cidade} - \nIdade: ${cadastros[i].idade} - \nProfissão: ${cadastros[i].profissao}`)
            }
        }

        function deletarContatos(cadastros){
            console.log('Deletando um contato cadastrado...')
            for(let i = 0; i < cadastros.length; i++){
                console.log( `Digite o número de telefone do usuário que você deseja deletar: ${i} - ${cadastros[i].telefone}`)
            }
        }

        let opcao = ''

        while(opcao !== '4' || opcao !== 'sair'){
             let opcao = prompt('Menu:\n1 - Cadastrar\n2 - Listar\n3 - Deletar\n4 - Sair')   
                switch(opcao){

                    break;

                        listarContatos(cadastros)
                    break;
