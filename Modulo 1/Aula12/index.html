    /*1. Crie um programa que peça para o usuário digitar o seu peso sua altura. O cronograma deve calcular o IMC do usuário IMC = peso/altura². Depois de mostrar o IMc, classfique em qual situação a pessoa se encontra de acordo com a seguinte tabela: 
    abaixo de 18,5 -> Abaixo do peso
    de 18,5 até 25 -> Peso normal
    de 25 até 30 -> Sobrepeso
    de 30 ou mais -> Obesidade */

        let peso = prompt('Digite o seu pego (Kg)')
        let altura = prompt('Digite a sua altura (Ex: 1.68)')
        peso = parseFloat(peso)
        altura = parseFloat(altura)

        let imc

        imc = peso / (altura * altura)

        console.log(`Seu IMC é: ${imc}`)


        if (imc < 18.5){
            console.log(`Você é Olívia Palito`)
        } else if (imc <= 25 ) {
            console.log(`Você é um normal`)
        } else if (imc <= 30){ 
            console.log(`Você ta gordin`)
        } else if (imc > 30) {
            console.log(`Você tá gordão`)
        }

    

    /*2. Peça para o usuário digitar 3 notas, calcule a média das notas e mostre na tela*/

        let nota1 = prompt("Digite a primeira nota")
        let nota2 = prompt("Digite a segunda nota")
        let nota3 = prompt("Digite a terceira nota")
        nota1 = parseInt(nota1)
        nota2 = parseInt(nota2)
        nota3 = parseInt(nota3)

        let media

        media = (nota1 + nota2 + nota3) / 3

        console.log(`Sua média é: ${media}`)

        if (media < 4){
            console.log(`REPROVADO`)
        } else if (media >= 7 ){
            console.log(`RECUPERAÇÃO`)
        } else if (media <= 10) {
            console.log(`APROVADO`)
        }
