<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 17</title>

<script>


let cadastros = [
    {
        nome: 'Wanderson',
        telefone: '11999999999',
        cidade: 'Fortaleza',
        idade: 30,
        profissao: 'Desenvolvedor'
    },
    {
        nome: 'Maria',
        telefone: '11988888888',
        cidade: 'São Paulo',
        idade: 25,
        profissao: 'Designer'
    },
    {
        nome: 'João',
        telefone: '11977777777',
        cidade: 'Rio de Janeiro',
        idade: 28,
        profissao: 'Analista de Sistemas'
    }
]

let opcao = ''

while(opcao !== '3'){
    opcao = prompt('Escolha uma opção:\n1 - Cadastrar\n2 - Listar\n3 - Sair')

    switch(opcao){
        case '1':
            console.log('Opção selecionada: Cadastrar')
            let cadastros = {}
            cadastros.nome = prompt('Digite o seu nome:')
            cadastros.telefone = prompt('Digite o seu número de telefone:')
            cadastros.cidade = parseInt(prompt('Digite a cidade:'))
            cadastros.idade = parseInt(prompt('Digite sua idade:'))
            cadastros.profissao = prompt('Digite a profissão:')

            cadastros.push(cadastros)
            console.log('Cadastro realizado com sucesso!')
        break;

        case '2':
            console.log('Opção selecionada: Listar');
            for(let i = 0; i < cadastros.length; i++){
                console.log( `Nome: ${cadastros[i].nome} - \nTelefone: ${cadastros.telefone}`)
            }
        break;

        case '3':
            console.log('Saindo do programa...')
        break;

        default:
            console.log('Opção inválida. Tente novamente.')
            break;
    }

}





</script>



</head>
<body>
    
</body>
</html>
