let opcao = ''

while(opcao !== '4'){
    opcao = prompt('Escolha uma opção:\n1 - Cadastrar\n2 - Listar\n3 - Deletar\n4 - Sair')

    switch(opcao){
        case '1':
            console.log('Opção selecionada: Cadastrar')
            let cadastro = {}
            cadastro.nome = prompt('Digite o seu nome:')
            cadastro.telefone = parseInt(prompt('Digite o seu número de telefone:'))
            cadastro.cidade = prompt('Digite a cidade:')
            cadastro.idade = parseInt(prompt('Digite sua idade:'))
            cadastro.profissao = prompt('Digite a profissão:')

            cadastros.push(cadastro)
            console.log('Cadastro realizado com sucesso!')
        break;

        case '2':
            console.log('Opção selecionada: Listar');
            for(let i = 0; i < cadastros.length; i++){
                console.log( `Nome: ${cadastros[i].nome} - \nTelefone: ${cadastros[i].telefone} - \nCidade: ${cadastros[i].cidade} - \nIdade: ${cadastros[i].idade} - \nProfissão: ${cadastros[i].profissao}`)
            }
        break;

        case '3':
            console.log('Opção selecionada: Deletar');
            for(let i = 0; i < cadastros.length; i++){
                console.log( `Digite o número de telefone do usuário que você deseja deletar: ${i} - ${cadastros[i].telefone}`)
            }
            
        break;

        case '4':
            console.log('Saindo do programa...')
        break;

        default:
            console.log('Opção inválida. Tente novamente.')
            break;
    }

}

function calcularBhaskara(a, b, c){
    let delta = (b * b) - (4 * a * c)

    if(delta < 0){
        console.log('Não existem raízes reais para essa equação.')
    } else if(delta === 0){
        let raiz = -b / (2 * a)
        console.log(`Existe uma raiz real para essa equação: ${raiz}`)
    } else {
        let raiz1 = (-b + Math.sqrt(delta)) / (2 * a)
        let raiz2 = (-b - Math.sqrt(delta)) / (2 * a)
        console.log(`Existem duas raízes reais para essa equação: x1 = ${raiz1} e x2 = ${raiz2}`)

        return [raiz1, raiz2]
    }

    let resultado = calcularBhaskara(1, 3, 2)

    console.log(resultado)
