<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        .main-forms {background-color: rgba(197, 194, 194, 0.9); 
            padding: 20px 20px 20px 20px;
            border-radius: 15px;}
        input {
            border-radius: 20px 20px 20px 20px; padding: 3px 3px 3px 3px;
        }
    </style>
</head>
<body>

    <h1>Formulário de Candidatura</h1>
    <br>

<form action=""></form>

<div class="main-forms">
        <label for="Nome">Nome:</label>
    <input id="Nome" name="" type="text" placeholder="Ex: Wanderson" required>
    <br><br>
        <label for="Email">Email:</label>
    <input id="" name="" type="Email" placeholder="Ex: Wanderson@gmail.com" required>
    <br><br>

    <label for="">Cargo de Tecnologia</label>
    <select name="Cargo de Tecnologia" id="cargo">
    <option value="">--Pessoa Desenvolvedora--</option>
    <option value="">Backend</option>
    <option value="">Frontend</option>
    <option value="">QA</option>
    <option value="">DBA</option>
    </select>
    <br><br>

 
    <label for="Genero">Genero:</label><br>

    <input type="radio" name="Masculino" id="Genero" value="Genero">
    <label for="Genero">Masculino</label>
        
    <input type="radio" name="Feminino" id="Genero" value="Genero">
    <label for="Genero"> Feminino</label>
        
    <input type="radio" name="Outro" id="Genero" value="Genero">
    <label for="Genero">Outro</label>
    <br><br>

            <label for="Local">Unidade de interesse:</label><br>
        <input type="checkbox" name="Fortaleza" id="Local" value="Local">
        <label for="Local">Fortaleza</label>
        
        <input type="checkbox" name="Horizonte" id="Local" value="Local">
        <label for="Local">Horizonte</label>
        
        <input type="checkbox" name="Eusébio" id="Local" value="Local">
        <label for="Local">Eusébio</label>
<br>
<br>
<label for="depoimento">Fale mais sobre você</label><br>
        <textarea name="depoimento" id="depoimento" rows="5" cols="30" maxlength="300" required>

        </textarea>
        <br><br>
        <input type="submit" value="Enviar">

</div>
</form>

</body>
</html>
