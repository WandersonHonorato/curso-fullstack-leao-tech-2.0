<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade Eventos e DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    
    <style>

    </style>

</head>
<body>
<form class="row g-3 m-2">
  <div class="col-md-6">
    <label for="inputName" class="form-label">Nome:</label>
    <input type="text" class="form-control" id="nome">
  </div>
  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Idade:</label>
    <input type="text" class="form-control" id="idade">
  </div>
  <div class="col-12">
    <label for="inputProfission" class="form-label">Profissão:</label>
    <input type="text" class="form-control" id="profissao" placeholder="Qual a sua Profissão?">
  </div>
  <div class="col-md-6">
    <label for="inputCity" class="form-label">Cidade:</label>
    <input type="text" class="form-control" id="cidade">
  </div>
  <div class="col-md-4">
    <label for="inputState" class="form-label">Estado:</label>
    <select id="estado" class="form-select">
      <option selected>Selecione...</option>
      <option>Ceará</option>
      <option>Alagoas</option>
      <option>Bahia</option>
      <option>Paraná</option>
      <option>São Paulo</option>
    <option>Bahia</option>
    </select>
  </div>
  <div class="row d-flex mt-3 mx-3 text">
  <div class="col-6">
    <button type="button" class="btn btn-primary " onclick="cadastrarUsuarios()">Cadastrar</button>
    <button type="button" class="btn btn-dark" onclick="listarUsuarios()">Listar</button>
    <button type="button" class="btn btn-danger" onclick="deletarUsuarios()">Deletar</button>
   </div>

   <div style="width: 700px; height: 300px;" class=" border border-3 border-dark my-4">
        <p class="mt-3 fw-bold fs-5">Usuários Cadastrados:</p>
        <span id="listaUsuarios"></span>
   </div>

</form>

   
<script>
        let usuarios = [];

        function cadastrarUsuarios() {
            let nome = document.getElementById('nome');
            let idade = document.getElementById('idade');
            let profissao = document.getElementById('profissao')
            let cidade = document.getElementById('cidade');
            let estado = document.getElementById('estado');
            idade = parseInt(idade.value);
            
            usuarios.push({
                nome: nome.value,
                idade: idade.value,
                profissao: profissao.value,
                cidade: cidade.value,
                estado: estado.value
            });

            if (!nome || !idade || !profissao || !cidade || estado === 'Selecione...'){
                console.log('Preencha todos os campos corretamente.');
            }
        }

        function listarUsuarios() {
            console.log('Lista de Usuários:');
            let listaUsuarios = document.getElementById('listaUsuarios');

                usuarios.forEach((usuario, index) => {
                console.log(`${index + 1}. Nome: ${usuario.nome}, Idade: ${usuario.idade}, Profissão: ${usuario.profissao}, Cidade: ${usuario.cidade}, Estado: ${usuario.estado}`);

                listaUsuarios.innerHTML += `<p>${index + 1}. Nome: ${usuario.nome}, Idade: ${usuario.idade}, Profissão: ${usuario.profissao}, Cidade: ${usuario.cidade}, Estado: ${usuario.estado}</p>`;
            });
        }

        function deletarUsuarios() {
            usuarios = [];
            let listaUsuarios = document.getElementById('listaUsuarios');
            listaUsuarios.innerHTML = '';
        }


    </script>




 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
