<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="script.js"></script>

  <style>
    img {
      height: 300px;
      object-fit: cover;
    }
  </style>
</head>

<body class="bg-light">

<div style="height: 500px;" class="container mt-5">
  <h2 class="text-center mb-4 fw-bold">Cadastro de Usuários</h2>

  <div class="card p-4 shadow">
    <div class="row g-2">
      <div class="col-md-6">
        <label for="cadastro">Nome:</label>
        <input type="text" id="nome" class="form-control" placeholder="Ex: Wanderson Honorato">
      </div>

      <div class="col-md-6">
        <label for="cadastro">Idade:</label>
        <input type="number" id="idade" class="form-control" placeholder="Digite sua idade">
      </div>

      <div class="col-md-6">
        <label for="cadastro">CPF:</label>
        <input type="text" id="cpf" class="form-control" placeholder="Digite seu CPF">
      </div>

      <div class="col-md-6">
        <label for="cadastro">Foto:</label>
        <input type="text" id="foto" class="form-control" placeholder="URL da Foto">
      </div>

      <div class="col-12 text-center mt-3">
        <button class="btn btn-success" onclick="cadastrarUsuario()">Cadastrar</button>
        <button class="btn btn-primary" onclick="listarUsuario()">Listar</button>
        <button class="btn btn-warning" onclick="editarUsuario()">Editar</button>
        <button class="btn btn-danger" onclick="limparCampos()">Limpar</button>
      </div>
    </div>
  </div>

  <div class="row mt-4" id="resultado"></div>
</div>

</body>
</html>
