//         Utilize o if ternário para resolver as seguintes questões:

// 1. Verifique se o usuário do sistema é maior de idade ou não

let idade = Number(prompt("Digite sua idade:"));

if (idade >= 18) {
    console.log(`Você tem ${idade} anos. Maior de idade.`);
} else {
    console.log(`Você tem ${idade} anos. Menor de idade.`);
}


// 2. Peça ao usuário um número e verifique se ele é ímpar ou par

let numero = Number(prompt("Digite um número:"));

if (numero % 2 === 0) {
    console.log(`O número ${numero} é par.`);
} else {
    console.log(`O número ${numero} é ímpar.`);
}


// 3. Peça ao usuário a nota de um aluno e se for maior que 7, mostre aprovado se não mostre recuperação.
let nota = Number(prompt("Digite a nota do aluno:"));

if (nota > 7) {
    console.log(`O aluno tirou ${nota} e foi aprovado.`);
} else {
    console.log(`O aluno tirou ${nota} e esta de recuperação.`);
}


// 4. Peça para um usuário digitar um número e só permita que o número seja positivo.

let numPositivo = Number(prompt("Digite um número positivo:"));

while (numPositivo < 0) {
    console.log("Número inválido! Digite um número positivo.");
    numPositivo = Number(prompt("Digite novamente:"));
}

console.log("Número válido:", numPositivo);


// 5. Peça para o usuário digitar o preço de um produto e diga se ele é caro se custar mais de 100 reais e barato se custar menos que 100.

let preco = parseFloat(prompt("Digite o preço do produto:"));

if (preco > 100) {
    console.log(`O produto custa R$ ${preco.toFixed(2)}, por isso é caro.`);
} else {
    console.log(`O produto custa R$ ${preco.toFixed(2)}, por isso é barato.`);
}

// 3. Um sistema escolar classifica alunos por conceito.

        break;

    case "B":
        console.log(`Bom desempenho!`);
        break;

    case "C":

        break;

    case "D":
        console.log(`Desempenho insuficiente!`);
        break;

    default:
        console.log(`Conceito inválido!`);
}

// 5. sistema de saque/depósito (simulação de caixa eletrônico)

// Você está desenvolvendo um sistema simples de caixa eletrônico.

// O sistema deve iniciar com um saldo fictício de R$ 1000.

// Mostre o seguinte menu:

// 1 - Consultar saldo
// 2 - Sacar dinheiro
// 3 - Depositar dinheiro

// Utilize switch para controlar o fluxo do sistema.

// Regras:

// 1 (Consultar saldo):
// 	exibir o saldo atual
// 2 (Sacar dinheiro):
// 	pedir o valor do saque
// 	verificar:
// 	se o valor é menor ou igual ao saldo → realizar saque
// 	senão → exibir "Saldo insuficiente"
// 		atualizar o saldo
// 	exibir novo saldo
// 3 (Depositar dinheiro):
// 	pedir o valor do depósito
// 	adicionar ao saldo
// 	exibir novo saldo

// 5. Simulação de Caixa Eletrônico

let saldo = 1000; // Saldo inicial

let opcao = prompt("Caixa Eletrônico\n1 - Consultar saldo\n2 - Sacar dinheiro\n3 - Depositar dinheiro");

switch (opcao) {
  case '1':
    console.log(`Seu saldo atual é: R$ ${saldo.toFixed(2)}`);
    break;

  case '2':
    let valorSaque = parseFloat(prompt("Quanto deseja sacar?"));

    if (valorSaque <= saldo) {
      saldo -= valorSaque; // Subtrai do saldo: saldo = saldo - valorSaque
      console.log("Saque realizado com sucesso!");
    } else {
      console.log("Saldo insuficiente.");
    }
    
    console.log(`Saldo atual: R$ ${saldo.toFixed(2)}`);
    break;

  case '3':
    let valorDeposito = parseFloat(prompt("Quanto deseja depositar?"));
    
    if (valorDeposito > 0) {
      saldo += valorDeposito; // Adiciona ao saldo: saldo = saldo + valorDeposito
      console.log("Depósito realizado com sucesso!");
    } else {
      console.log("Valor de depósito inválido.");
    }
    
    console.log(`Novo saldo: R$ ${saldo.toFixed(2)}`);
    break;

  default:
    console.log("Opção inválida.");
}
