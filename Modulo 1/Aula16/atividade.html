// Regras:

// 1 (Consultar saldo):
// 	exibir o saldo atual
// 2 (Sacar dinheiro):

// 3 (Depositar dinheiro):
// 	pedir o valor do depósito
// 	adicionar ao saldo
// 	exibir novo saldo

// 5. Simulação de Caixa Eletrônico

let saldo = 1000

let option1 = prompt(`Bem-vindo ao Caixa Eletrônico!\nEscolha uma opção:\n1 - Consultar saldo\n2 - Sacar dinheiro\n3 - Depositar dinheiro`);

switch (option1) {
  case '1':
    console.log(`Seu saldo atual é: R$ ${saldo.toFixed(2)}`);
    break;

  case '2':
    let valorSaque = parseFloat(prompt(`Quanto deseja sacar?`));

    if (valorSaque <= saldo) {
    // Subtrai do saldo: saldo = saldo - valorSaque
      saldo -= valorSaque; 
      console.log("Saque realizado com sucesso!");
    } else {
      console.log(`Saldo insuficiente.`);

  case '3':
    let valorDeposito = parseFloat(prompt(`Quanto deseja depositar?`));

    // Adiciona ao saldo: saldo = saldo + valorDeposito
      saldo += valorDeposito; 
      console.log(`Depósito realizado com sucesso!`);
    } else {
      console.log(`Valor de depósito inválido.`);
    }

    break;

  default:
    console.log(`Opção inválida.`);
}

        console.log(`O produto "${product.nome}" está com estoque baixo, apenas (${product.estoque} unidades).`);
    }

    console.log("----------------------------");
}

// 9. Controle de vendas
// Crie um array de objetos vendas com:
// cliente
// produto
// quantidade
// precoUnitario

// Percorra o array e calcule:

// total de cada venda
// valor total de todas as vendas somadas

// Se uma venda passar de 100 reais, exiba “Venda alta”.


let vendas = [
    { cliente: "Wanderson", produto: "Notebook", quantidade: 1, precoUnitario: 2400 },
    { cliente: "Yu-Gi-Oh", produto: "Cartas de Monstros de Duelo, Ofical", quantidade: 2, precoUnitario: 250 },
    { cliente: "Ash Ketchum", produto: "Pokebolas, Master Balls", quantidade: 3, precoUnitario: 50 }
];

let faturamento = 0;

for (const sell of vendas) {
    let totalVenda = sell.quantidade * sell.precoUnitario;
    faturamento += totalVenda;
    
    console.log(`Venda para ${sell.cliente}: R$ ${totalVenda}`);
    
    if (totalVenda > 100) {
        console.log("Venda alta!");
    }
}

console.log(`Valor total de todas as vendas: R$ ${faturamento.toFixed(2)}`);
